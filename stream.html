<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Streaming Room</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0b0f19; color: #f3f4f6; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .container { width: 100%; max-width: 900px; background: #111827; border: 1px solid #1f2937; border-radius: 16px; padding: 30px; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3); text-align: center; }
        h1 { font-size: 24px; margin-bottom: 20px; color: #3b82f6; }
        .video-wrapper { position: relative; background: #000; border-radius: 12px; overflow: hidden; aspect-ratio: 16/9; margin-top: 20px; border: 1px solid #374151; }
        video { width: 100%; height: 100%; object-fit: contain; }
        
        #adminControls { display: none; margin-bottom: 20px; padding: 15px; background: rgba(16, 185, 129, 0.1); border: 1px dashed #10b981; border-radius: 8px; }
        .btn-stream { background: #10b981; color: white; padding: 10px 25px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .btn-stream:hover { background: #059669; }
        
        .btn-logout { background: #374151; color: white; padding: 6px 15px; font-size: 12px; margin-top: 20px; border: 1px solid #4b5563; border-radius: 6px; cursor: pointer; }
        .btn-logout:hover { background: #ef4444; }
        .status-badge { display: inline-block; padding: 4px 12px; background: #ef4444; color: white; border-radius: 20px; font-size: 12px; font-weight: bold; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="container">
        <span class="status-badge">LIVE STREAM</span>
        
        <div id="adminControls">
            <p style="color: #10b981; font-weight: bold; margin-bottom: 10px;">Mode Broadcaster Aktif</p>
            <button class="btn-stream" onclick="mulaiMembagikanLayar()">Mulai Share Screen Laptop</button>
        </div>

        <h1 id="streamTitle">Menunggu Siaran...</h1>
        <div class="video-wrapper">
            <video id="videoPlayer" autoplay playsinline muted controls></video>
        </div>

        <br>
        <button class="btn-logout" onclick="logoutSistem()">Keluar / Ganti Token</button>
    </div>

    <script>
        const TOKEN_ADMIN = "admin_123*";      
        const TOKEN_VIEWER = "JKT480102";       
        const PEER_ADMIN_ID = "ekin-private-screen-room-xyz123"; 

        let peer = null;
        let localStream = null;
        let currentCall = null;
        let reconnectTimeout = null;

        const peerConfig = {
            config: {
                'iceServers': [
                    { 'urls': 'stun:stun.l.google.com:19302' },
                    { 'urls': 'stun:stun1.l.google.com:19302' },
                    { 'urls': 'stun:stun2.l.google.com:19302' }
                ]
            }
        };

        window.onload = function() {
            const tokenTersimpan = sessionStorage.getItem("status_login");
            
            if (!tokenTersimpan) {
                window.location.href = "index.html";
                return;
            }

            if (tokenTersimpan === TOKEN_ADMIN) {
                document.getElementById("adminControls").style.display = "block";
                document.getElementById("streamTitle").innerText = "Panel Penyiaran Layar";
                
                peer = new Peer(PEER_ADMIN_ID, peerConfig);
                
                peer.on('call', (call) => {
                    if (localStream && localStream.active) { 
                        call.answer(localStream); 
                    } else {
                        call.answer(new MediaStream());
                    }
                });
            } else if (tokenTersimpan === TOKEN_VIEWER) {
                document.getElementById("adminControls").style.display = "none";
                document.getElementById("streamTitle").innerText = "Streaming Layar Laptop";

                peer = new Peer(peerConfig);
                peer.on('open', (id) => {
                    HubungkanKeAdmin();
                });

                peer.on('error', (err) => {
                    console.log("Koneksi bermasalah, menjadwalkan ulang...");
                    SistemReconnectViewer();
                });
            }
        };

        function HubungkanKeAdmin() {
            // Bersihkan sisa call lama agar tidak duplikat
            if (currentCall) {
                currentCall.close();
            }

            // Viewer mengirimkan MediaStream kosong untuk memicu handshake
            currentCall = peer.call(PEER_ADMIN_ID, new MediaStream());
            
            currentCall.on('stream', (remoteStream) => {
                const videoElement = document.getElementById("videoPlayer");
                
                // Perbaikan Validasi Track Media (Mengatasi bug ontrack & stale tracks)
                if (remoteStream && remoteStream.getVideoTracks().length > 0) {
                    const videoTrack = remoteStream.getVideoTracks()[0];
                    
                    if (videoTrack.readyState === 'live') {
                        document.getElementById("streamTitle").innerText = "🔴 Live Streaming Sedang Berlangsung";
                        
                        // Stop track lama yang menempel di element video sebelum ganti yang baru
                        if (videoElement.srcObject && videoElement.srcObject !== remoteStream) {
                            let oldStream = videoElement.srcObject;
                            oldStream.getTracks().forEach(track => track.stop());
                        }

                        videoElement.srcObject = remoteStream;
                        videoElement.play().catch(e => console.log("Autoplay ditahan browser."));
                    }
                }
            });

            currentCall.on('close', () => {
                SistemReconnectViewer();
            });
        }

        // Mencegah timer tumpang tindih (Overlap Reconnect Timers)
        function SistemReconnectViewer() {
            if (reconnectTimeout) {
                clearTimeout(reconnectTimeout);
            }
            reconnectTimeout = setTimeout(() => {
                if (peer && !peer.destroyed) {
                    HubungkanKeAdmin();
                }
            }, 3000); // Coba lagi setiap 3 detik dengan aman
        }

        async function mulaiMembagikanLayar() {
            try {
                // Hentikan stream lama jika admin melakukan restart share screen
                if (localStream) {
                    localStream.getTracks().forEach(track => track.stop());
                }

                localStream = await navigator.mediaDevices.getDisplayMedia({
                    video: { cursor: "always" },
                    audio: true
                });
                
                const videoElement = document.getElementById("videoPlayer");
                videoElement.srcObject = localStream;
                videoElement.muted = true; 

                // Deteksi jika admin mengklik tombol "Stop Sharing" bawaan browser browser
                localStream.getVideoTracks()[0].onended = function () {
                    localStream.getTracks().forEach(track => track.stop());
                    localStream = null; // Rekonsiliasi status stream agar kembali kosong
                    document.getElementById("streamTitle").innerText = "Siaran Dihentikan Admin";
                };

                alert("Layar berhasil dibagikan! Silakan buka atau refresh halaman di HP.");
            } catch (err) {
                alert("Gagal share screen: " + err);
            }
        }

        function logoutSistem() {
            if (reconnectTimeout) clearTimeout(reconnectTimeout);
            if (currentCall) currentCall.close();
            if (localStream) localStream.getTracks().forEach(track => track.stop());
            if (peer) peer.destroy();

            sessionStorage.removeItem("status_login");
            window.location.href = "index.html";
        }
    </script>
</body>
</html>

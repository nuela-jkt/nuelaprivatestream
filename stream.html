<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Streaming Room</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0b0f19; color: #f3f4f6; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .container { width: 100%; max-width: 900px; background: #111827; border: 1px solid #1f2937; border-radius: 16px; padding: 30px; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3); text-align: center; }
        h1 { font-size: 24px; margin-bottom: 20px; color: #3b82f6; }
        .video-wrapper { position: relative; background: #000; border-radius: 12px; overflow: hidden; aspect-ratio: 16/9; margin-top: 20px; border: 1px solid #374151; }
        video { width: 100%; height: 100%; object-fit: contain; }
        #adminControls { display: none; margin-bottom: 20px; padding: 15px; background: rgba(16, 185, 129, 0.1); border: 1px dashed #10b981; border-radius: 8px; }
        .btn-stream { background: #10b981; color: white; padding: 10px 25px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .btn-stream:hover { background: #059669; }
        .btn-logout { background: #374151; color: white; padding: 6px 15px; font-size: 12px; margin-top: 20px; border: 1px solid #4b5563; border-radius: 6px; cursor: pointer; }
        .btn-logout:hover { background: #ef4444; }
        .status-badge { display: inline-block; padding: 4px 12px; background: #ef4444; color: white; border-radius: 20px; font-size: 12px; font-weight: bold; margin-bottom: 10px; }
        .viewer-count { display: inline-block; margin-top: 10px; padding: 6px 14px; background: rgba(59, 130, 246, 0.16); border: 1px solid #3b82f6; border-radius: 999px; color: #bfdbfe; font-size: 13px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <span class="status-badge">LIVE STREAM</span>
        <div id="adminControls">
            <p style="color: #10b981; font-weight: bold; margin-bottom: 10px;">Mode Broadcaster Aktif</p>
            <button class="btn-stream" onclick="mulaiMembagikanLayar()">Mulai Share Screen Laptop</button>
            <div id="viewerCount" class="viewer-count">Penonton: 0</div>
        </div>
        <h1 id="streamTitle">Menunggu Siaran...</h1>
        <div class="video-wrapper">
            <video id="videoPlayer" autoplay playsinline muted controls></video>
        </div>
        <br>
        <button class="btn-logout" onclick="logoutSistem()">Keluar / Ganti Token</button>
    </div>

    <script>
        const TOKEN_ADMIN = "admin_123*";
        const TOKEN_VIEWER = "FJKT482026";
        const ROOM_ID = "ekin-private-screen-room-xyz123";

        firebase.initializeApp({
            databaseURL: "https://stream-nuela-default-rtdb.asia-southeast1.firebasedatabase.app/"
        });

        const database = firebase.database();
        const roomRef = database.ref(`rooms/${ROOM_ID}`);
        const viewersRef = roomRef.child("viewers");

        const iceServers = [
            { urls: "stun:stun.l.google.com:19302" },
            { urls: "stun:stun1.l.google.com:19302" },
            { urls: "stun:stun2.l.google.com:19302" },
            { urls: "turn:openrelay.metered.ca:80", username: "openrelay", credential: "openrelay" },
            { urls: "turn:openrelay.metered.ca:443?transport=tcp", username: "openrelay", credential: "openrelay" }
        ];

        let role = null;
        let peerConnection = null;
        let localStream = null;
        let remoteStreamAktif = null;
        let sedangMenghentikanStream = false;
        let adminConnections = {};
        let viewerId = null;
        let lastOfferSdp = "";
        let jumlahViewerAktif = 0;

        window.onload = function() {
            const tokenTersimpan = localStorage.getItem("status_login");

            if (tokenTersimpan === TOKEN_ADMIN) {
                role = "admin";
                document.getElementById("adminControls").style.display = "block";
                document.getElementById("streamTitle").innerText = "Panel Penyiaran Layar";
                setupAdmin();
            } else if (tokenTersimpan === TOKEN_VIEWER) {
                role = "viewer";
                document.getElementById("adminControls").style.display = "none";
                document.getElementById("streamTitle").innerText = "Streaming Layar Laptop";
                setupViewer();
            } else {
                localStorage.removeItem("status_login");
                window.location.href = "index.html";
            }
        };

        function setupAdmin() {
            roomRef.child("admin").set({ status: "online", updatedAt: Date.now() });
            roomRef.child("admin").onDisconnect().update({ status: "offline", updatedAt: Date.now() });

            viewersRef.on("value", snapshot => {
                const viewers = snapshot.val() || {};
                jumlahViewerAktif = Object.keys(viewers).length;
                updateTampilanJumlahViewer();
            });

            viewersRef.on("child_added", snapshot => {
                if (localStream) {
                    buatKoneksiAdminKeViewer(snapshot.key);
                }
            });

            viewersRef.on("child_removed", snapshot => {
                tutupKoneksiAdmin(snapshot.key);
            });

            viewersRef.on("child_changed", snapshot => {
                if (localStream) {
                    buatKoneksiAdminKeViewer(snapshot.key);
                }
            });
        }

        function setupViewer() {
            viewerId = `viewer_${Date.now()}_${Math.random().toString(36).slice(2)}`;
            const viewerRef = viewersRef.child(viewerId);

            viewerRef.update({
                status: "online",
                updatedAt: Date.now(),
                offer: null,
                answer: null,
                adminCandidates: null,
                viewerCandidates: null
            });
            viewerRef.onDisconnect().remove();

            viewerRef.child("offer").on("value", async snapshot => {
                const offer = snapshot.val();

                if (!offer || offer.sdp === lastOfferSdp) {
                    return;
                }

                lastOfferSdp = offer.sdp;
                await buatJawabanViewer(offer);
            });
        }

        function updateTampilanJumlahViewer() {
            const viewerCountElement = document.getElementById("viewerCount");

            if (viewerCountElement) {
                viewerCountElement.innerText = `Penonton: ${jumlahViewerAktif}`;
            }
        }

        function aturBitrateVideoPc(pc) {
            let videoSender = null;
            const senders = pc.getSenders();

            for (const sender of senders) {
                if (sender.track && sender.track.kind === "video") {
                    videoSender = sender;
                    break;
                }
            }

            if (!videoSender) {
                return;
            }

            const parameters = videoSender.getParameters();

            if (!parameters.encodings || parameters.encodings.length === 0) {
                parameters.encodings = [{}];
            }

            parameters.encodings[0].maxBitrate = 2500000;

            videoSender.setParameters(parameters).catch(err => {
                console.log("Gagal atur bitrate video:", err);
            });
        }

        function aturBitrateAudioPc(pc) {
            let audioSender = null;
            const senders = pc.getSenders();

            for (const sender of senders) {
                if (sender.track && sender.track.kind === "audio") {
                    audioSender = sender;
                    break;
                }
            }

            if (!audioSender) {
                return;
            }

            const parameters = audioSender.getParameters();

            if (!parameters.encodings || parameters.encodings.length === 0) {
                parameters.encodings = [{}];
            }

            parameters.encodings[0].maxBitrate = 128000;

            audioSender.setParameters(parameters).catch(err => {
                console.log("Gagal atur bitrate audio:", err);
            });
        }

        async function mulaiMembagikanLayar() {
            try {
                if (localStream) {
                    localStream.getTracks().forEach(track => track.stop());
                }

                localStream = await navigator.mediaDevices.getDisplayMedia({
                    video: {
                        cursor: "always",
                        frameRate: { ideal: 30, max: 30 },
                        width: { ideal: 1920, max: 1920 },
                        height: { ideal: 1080, max: 1080 }
                    },
                    audio: {
                        echoCancellation: false,
                        noiseSuppression: false,
                        autoGainControl: false,
                        channelCount: { ideal: 2 },
                        sampleRate: { ideal: 48000 },
                        sampleSize: { ideal: 16 }
                    }
                });

                if (!localStream.getVideoTracks()[0]) {
                    alert("Gagal share screen: tidak ada video track.");
                    return;
                }

                const videoElement = document.getElementById("videoPlayer");
                videoElement.srcObject = localStream;
                videoElement.muted = true;

                localStream.getTracks().forEach(track => {
                    track.addEventListener("ended", hentikanStreamAdmin);
                });

                const snapshot = await viewersRef.once("value");
                const viewers = snapshot.val() || {};
                Object.keys(viewers).forEach(viewerKey => buatKoneksiAdminKeViewer(viewerKey));

                alert("Layar berhasil dibagikan. Viewer akan tersambung otomatis.");
            } catch (err) {
                alert("Gagal share screen: " + err);
            }
        }

        async function buatKoneksiAdminKeViewer(idViewer) {
            if (!localStream || !idViewer) {
                return;
            }

            if (adminConnections[idViewer]) {
                const state = adminConnections[idViewer].connectionState;

                if (state !== "failed" && state !== "disconnected" && state !== "closed") {
                    return;
                }

                tutupKoneksiAdmin(idViewer);
            }

            const pc = new RTCPeerConnection({ iceServers });
            adminConnections[idViewer] = pc;

            localStream.getTracks().forEach(track => {
                pc.addTrack(track, localStream);
            });
            aturBitrateVideoPc(pc);
            aturBitrateAudioPc(pc);

            pc.onicecandidate = event => {
                if (event.candidate) {
                    viewersRef.child(`${idViewer}/adminCandidates`).push(event.candidate.toJSON());
                }
            };

            pc.onconnectionstatechange = () => {
                document.getElementById("streamTitle").innerText = `Koneksi viewer ${idViewer}: ${pc.connectionState}`;
            };

            viewersRef.child(`${idViewer}/answer`).on("value", async snapshot => {
                const answer = snapshot.val();

                if (!answer || pc.remoteDescription && pc.remoteDescription.type === "answer") {
                    return;
                }

                try {
                    await pc.setRemoteDescription(new RTCSessionDescription(answer));
                } catch (err) {
                    console.log("Gagal pasang answer viewer:", err);
                }
            });

            viewersRef.child(`${idViewer}/viewerCandidates`).on("child_added", snapshot => {
                const candidate = snapshot.val();

                if (candidate) {
                    pc.addIceCandidate(new RTCIceCandidate(candidate)).catch(() => {});
                }
            });

            viewersRef.child(`${idViewer}/offer`).remove();
            viewersRef.child(`${idViewer}/answer`).remove();
            viewersRef.child(`${idViewer}/adminCandidates`).remove();
            viewersRef.child(`${idViewer}/viewerCandidates`).remove();

            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);
            viewersRef.child(`${idViewer}/offer`).set({ type: offer.type, sdp: offer.sdp });
        }

        async function buatJawabanViewer(offer) {
            if (peerConnection) {
                peerConnection.close();
            }

            viewersRef.child(`${viewerId}/answer`).remove();

            peerConnection = new RTCPeerConnection({ iceServers });

            peerConnection.ontrack = event => {
                tampilkanRemoteStream(event.streams[0]);
            };

            peerConnection.onicecandidate = event => {
                if (event.candidate) {
                    viewersRef.child(`${viewerId}/viewerCandidates`).push(event.candidate.toJSON());
                }
            };

            peerConnection.onconnectionstatechange = () => {
                if (peerConnection.connectionState === "failed" || peerConnection.connectionState === "disconnected") {
                    document.getElementById("streamTitle").innerText = "Koneksi terputus, mencoba menyambung ulang...";
                    viewersRef.child(`${viewerId}`).update({
                        status: "retry",
                        updatedAt: Date.now(),
                        answer: null,
                        viewerCandidates: null
                    });
                }
            };

            viewersRef.child(`${viewerId}/adminCandidates`).on("child_added", snapshot => {
                const candidate = snapshot.val();

                if (candidate) {
                    peerConnection.addIceCandidate(new RTCIceCandidate(candidate)).catch(() => {});
                }
            });

            try {
                await peerConnection.setRemoteDescription(new RTCSessionDescription(offer));
            } catch (err) {
                document.getElementById("streamTitle").innerText = "Gagal menerima siaran, mencoba lagi...";
                viewersRef.child(`${viewerId}`).update({
                    status: "retry",
                    updatedAt: Date.now(),
                    answer: null,
                    viewerCandidates: null
                });
                return;
            }

            const answer = await peerConnection.createAnswer();
            await peerConnection.setLocalDescription(answer);
            viewersRef.child(`${viewerId}/answer`).set({ type: answer.type, sdp: answer.sdp });
        }

        function tampilkanRemoteStream(stream) {
            const videoElement = document.getElementById("videoPlayer");

            if (remoteStreamAktif && remoteStreamAktif !== stream) {
                remoteStreamAktif.getTracks().forEach(track => track.stop());
            }

            remoteStreamAktif = stream;
            videoElement.srcObject = stream;

            if (stream.getVideoTracks().length > 0) {
                document.getElementById("streamTitle").innerText = "🔴 Live Streaming Sedang Berlangsung";
            } else {
                document.getElementById("streamTitle").innerText = "Menunggu admin mulai share screen...";
            }

            stream.addEventListener("addtrack", () => {
                if (stream.getVideoTracks().length > 0) {
                    document.getElementById("streamTitle").innerText = "🔴 Live Streaming Sedang Berlangsung";
                    videoElement.srcObject = stream;
                }
            });

            stream.addEventListener("removetrack", () => {
                if (stream.getVideoTracks().length === 0) {
                    document.getElementById("streamTitle").innerText = "Share screen admin berhenti, mencoba menyambung ulang...";
                }
            });

            videoElement.play().catch(() => {});
            videoElement.addEventListener("click", () => {
                videoElement.play().catch(() => {});
            });
        }

        function hentikanStreamAdmin() {
            if (sedangMenghentikanStream) {
                return;
            }

            sedangMenghentikanStream = true;

            if (localStream) {
                localStream.getTracks().forEach(track => track.stop());
            }

            localStream = null;
            Object.keys(adminConnections).forEach(idViewer => tutupKoneksiAdmin(idViewer));
            document.getElementById("streamTitle").innerText = "Share screen berhenti";
            sedangMenghentikanStream = false;
        }

        function tutupKoneksiAdmin(idViewer) {
            if (adminConnections[idViewer]) {
                adminConnections[idViewer].close();
                delete adminConnections[idViewer];
            }

            viewersRef.child(`${idViewer}/offer`).remove();
            viewersRef.child(`${idViewer}/answer`).remove();
            viewersRef.child(`${idViewer}/adminCandidates`).remove();
            viewersRef.child(`${idViewer}/viewerCandidates`).remove();
        }

        function logoutSistem() {
            sedangMenghentikanStream = true;

            if (localStream) {
                localStream.getTracks().forEach(track => track.stop());
            }

            if (remoteStreamAktif) {
                remoteStreamAktif.getTracks().forEach(track => track.stop());
            }

            Object.keys(adminConnections).forEach(idViewer => tutupKoneksiAdmin(idViewer));

            if (peerConnection) {
                peerConnection.close();
            }

            if (viewerId) {
                viewersRef.child(viewerId).remove();
            }

            roomRef.child("admin").remove();
            localStorage.removeItem("status_login");
            window.location.href = "index.html";
        }
    </script>
</body>
</html>
